version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: investment_mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - investment_network

  redis:
    image: redis:7-alpine
    container_name: investment_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - investment_network

volumes:
  mongodb_data:
  redis_data:

networks:
  investment_network:
    driver: bridge
